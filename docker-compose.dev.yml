# Development compose file.
#
# Default:  docker compose -f docker-compose.dev.yml up -d
#           → starts infrastructure only (Postgres + MinIO)
#           → run backend & frontend locally for native debugging
#
# Full:    docker compose -f docker-compose.dev.yml --profile full up -d --build
#           → builds & starts everything in Docker (for testing containers)

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-familyvault}
      POSTGRES_USER: ${POSTGRES_USER:-familyvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-familyvault}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-familyvault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["full"]
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env.development
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-familyvault}:${POSTGRES_PASSWORD:-familyvault}@postgres:5432/${POSTGRES_DB:-familyvault}
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000/api}
        APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
